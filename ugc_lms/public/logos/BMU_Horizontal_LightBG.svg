<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 80" fill="none">
  <!-- Logomark: Pilkhan tree with overlapping colored circles -->
  <g transform="translate(10, 4)">
    <!-- Overlapping circles (canopy) -->
    <circle cx="36" cy="28" r="22" fill="#002470" opacity="0.7"/>
    <circle cx="28" cy="36" r="18" fill="#0DA88F" opacity="0.6"/>
    <circle cx="44" cy="36" r="18" fill="#FC8533" opacity="0.55"/>
    <circle cx="36" cy="20" r="16" fill="#52C2FF" opacity="0.6"/>
    <circle cx="24" cy="26" r="14" fill="#6BC791" opacity="0.55"/>
    <circle cx="48" cy="26" r="14" fill="#F56969" opacity="0.5"/>
    <circle cx="36" cy="40" r="14" fill="#FFB83D" opacity="0.5"/>
    <!-- Tree trunk and branches (white) -->
    <g stroke="#fff" stroke-width="2" stroke-linecap="round" fill="none">
      <path d="M36 55 L36 32"/>
      <path d="M36 38 L28 28"/>
      <path d="M36 35 L44 26"/>
      <path d="M36 42 L30 36"/>
      <path d="M36 40 L43 34"/>
      <path d="M28 28 L24 22"/>
      <path d="M44 26 L48 20"/>
      <path d="M30 36 L26 32"/>
    </g>
  </g>
  <!-- Text: BML MUNJAL UNIVERSITY -->
  <g transform="translate(82, 18)">
    <text font-family="'Amplitude', 'Inter', 'Helvetica Neue', sans-serif" font-weight="800" font-size="22" fill="#002470" letter-spacing="0.5">
      <tspan x="0" y="0">BML MUNJAL</tspan>
      <tspan x="0" y="24">UNIVERSITY</tspan>
    </text>
    <text font-family="'Inter', 'Helvetica Neue', sans-serif" font-weight="600" font-size="7.5" fill="#002470" letter-spacing="1.2">
      <tspan x="0" y="40">A HERO GROUP INITIATIVE</tspan>
    </text>
  </g>
  <!-- TM symbol -->
  <text x="260" y="18" font-family="'Inter', sans-serif" font-size="7" fill="#002470" font-weight="500">™</text>
</svg>
