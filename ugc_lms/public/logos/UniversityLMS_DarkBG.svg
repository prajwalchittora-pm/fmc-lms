<svg width="220" height="36" viewBox="0 0 220 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Logomark: Stylized "U" with integrated graduation cap -->
  <g transform="translate(2, 2)">
    <!-- The "U" shape — smooth rounded bottom -->
    <path d="M5 6 L5 20 Q5 30 16 30 Q27 30 27 20 L27 6"
      stroke="url(#u-grad)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Graduation cap on top-right of the U -->
    <path d="M20 6 L27 2.5 L34 6 L27 9.5 Z" fill="#FF6A00"/>
    <!-- Tassel -->
    <path d="M31 5.5 Q32 8 31 11" stroke="#FF6A00" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <circle cx="31" cy="11.5" r="1.2" fill="#FF6A00"/>
    <!-- Degree dot accent on the U's left arm -->
    <circle cx="5" cy="4" r="1.5" fill="rgba(255,255,255,0.5)"/>
  </g>
  <defs>
    <linearGradient id="u-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  <!-- Text -->
  <text x="44" y="23" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="800" font-size="16" letter-spacing="0.2">
    <tspan fill="#FFFFFF">University </tspan><tspan fill="#FF6A00">LMS</tspan>
  </text>
</svg>
