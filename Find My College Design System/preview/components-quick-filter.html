<!-- @dsCard group="Components" -->
<!-- figma: 223:366 Quick Filter -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:26px 28px; background:var(--bg-white); display:flex; flex-direction:column; gap:14px; }
  .head { font-size:12px; color:var(--text-tertiary); }
  .head b { color:var(--text-secondary); font-weight:700; }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .qf {
    display:inline-flex; align-items:center; gap:8px;
    height:36px; padding:0 16px; border-radius:10px;
    background:#fff; border:1px solid var(--border-subtle);
    font-family:'Inter'; font-size:14px; font-weight:500; color:var(--text-primary);
    cursor:pointer;
  }
  .qf.selected {
    background:var(--bg-pastel-beige-3);
    border-color:var(--border-orange);
    color:var(--orange-800);
    font-weight:600;
  }
  .qf .x { width:14px; height:14px; }
  .state { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.06em; font-weight:700; }
  .cell { display:flex; flex-direction:column; gap:6px; align-items:flex-start; }
</style></head>
<body>
  <div class="head"><b>Quick Filter</b> · Figma <code style="font-size:11px;">223:366</code> · 36h · 10px radius · beige-3 fill + orange border when selected (with close)</div>
  <div class="row">
    <div class="cell"><div class="state">Default</div><div class="qf">Label 1</div></div>
    <div class="cell"><div class="state">Selected</div>
      <div class="qf selected">Label 1
        <svg class="x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </div>
    </div>
  </div>
</body></html>
