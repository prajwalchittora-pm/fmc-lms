<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--bg-white); }
  .display { font-family:var(--font-display); font-size:64px; font-weight:700; color:var(--text-headings); line-height:1.20; }
  .meta { display:flex; gap:14px; margin-top:10px; font-size:11px; color:var(--text-tertiary); font-feature-settings:"tnum"; }
  .meta span::before { content:"•"; margin-right:6px; color:var(--neutral-300); }
  .meta span:first-child::before { display:none; }
</style></head>
<body>
  <div style="font-size:11px; color:var(--text-tertiary); font-weight:600; margin-bottom:10px;">
    <span style="color:var(--text-primary); font-weight:700;">Casing:</span> Title Case — capitalise the first letter of every significant word.
  </div>
  <div class="display">Find My <span class="highlight">College</span></div>
  <div class="meta"><span>Display</span><span>Bricolage Grotesque</span><span>64 / 700</span><span>line-height 1.20</span></div>
</body></html>
