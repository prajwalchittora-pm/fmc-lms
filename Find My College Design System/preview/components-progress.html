<!-- @dsCard group="Components" -->
<!-- figma: 223:231 Progress -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:26px 28px; background:var(--bg-white); display:flex; flex-direction:column; gap:18px; }
  .head { font-size:12px; color:var(--text-tertiary); }
  .head b { color:var(--text-secondary); font-weight:700; }
  .progress { display:flex; gap:8px; width:402px; max-width:100%; }
  .seg { flex:1; height:4px; border-radius:20px; background:var(--neutral-100); }
  .seg.done { background:var(--orange-600); }
  .row { display:flex; flex-direction:column; gap:8px; }
  .state { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.06em; font-weight:700; }
</style></head>
<body>
  <div class="head"><b>Progress</b> · Figma <code style="font-size:11px;">223:231</code> · 4px tall · 3 segments · 8px gap · orange-600 completed</div>
  <div class="row"><div class="state">Step 1 / 3</div>
    <div class="progress"><div class="seg done"></div><div class="seg"></div><div class="seg"></div></div></div>
  <div class="row"><div class="state">Step 2 / 3</div>
    <div class="progress"><div class="seg done"></div><div class="seg done"></div><div class="seg"></div></div></div>
  <div class="row"><div class="state">Step 3 / 3 — complete</div>
    <div class="progress"><div class="seg done"></div><div class="seg done"></div><div class="seg done"></div></div></div>
</body></html>
