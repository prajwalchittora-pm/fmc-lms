<!-- figma: 221:122 Marquee -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 0; background:var(--bg-white); display:flex; flex-direction:column; gap:14px; }
  .head { font-size:12px; color:var(--text-tertiary); padding:0 28px; }
  .head b { color:var(--text-secondary); font-weight:700; }
  .marquee {
    width:100%; height:48px;
    background:linear-gradient(90deg, #1E4FBA 0%, #B8699F 50%, #CB7A44 100%);
    overflow:hidden; position:relative;
  }
  .marquee-track {
    display:flex; align-items:center; gap:32px;
    height:100%;
    animation: marquee 24s linear infinite;
    white-space:nowrap;
    padding-left:32px;
  }
  .marquee-item {
    color:#fff; font-family:'Inter'; font-weight:800; font-size:14px;
    letter-spacing:.08em; text-transform:uppercase;
  }
  .dot { color:rgba(255,255,255,0.7); font-size:10px; }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
</style></head>
<body>
  <div class="head"><b>Marquee</b> · Figma <code style="font-size:11px;">221:122</code> · 48h band · blue→purple→pink→orange gradient · scrolling label list</div>
  <div class="marquee">
    <div class="marquee-track">
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <!-- duplicate for seamless loop -->
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
      <span class="marquee-item">Label</span><span class="dot">•</span>
    </div>
  </div>
</body></html>
