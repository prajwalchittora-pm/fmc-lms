<!-- @dsCard group="Spacing" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 28px; background:var(--bg-white); }
  .head { font-size:12px; color:var(--text-tertiary); margin-bottom:14px; }
  .head b { color:var(--text-secondary); font-weight:700; }
  .grid { display:flex; gap:16px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .sq { background:var(--blue-50); border:1px solid var(--blue-300); }
  .name { font-size:11px; color:var(--text-secondary); font-weight:600; font-feature-settings:"tnum"; text-align:center; line-height:1.3; }
  .name span { display:block; color:var(--text-tertiary); font-weight:400; }
</style></head>
<body>
  <div class="head"><b>Corner radius</b> · default UI radius is <code>--radius-md</code> (12px). Pills are fully rounded.</div>
  <div class="grid">
    <div class="item"><div class="sq" style="width:72px;height:72px;border-radius:4px;"></div><div class="name">xs<span>4px</span></div></div>
    <div class="item"><div class="sq" style="width:72px;height:72px;border-radius:8px;"></div><div class="name">sm<span>8px</span></div></div>
    <div class="item"><div class="sq" style="width:72px;height:72px;border-radius:12px; outline:2px solid var(--blue-700); outline-offset:3px;"></div><div class="name">md · default<span>12px</span></div></div>
    <div class="item"><div class="sq" style="width:72px;height:72px;border-radius:16px;"></div><div class="name">lg<span>16px</span></div></div>
    <div class="item"><div class="sq" style="width:72px;height:72px;border-radius:20px;"></div><div class="name">xl<span>20px</span></div></div>
    <div class="item"><div class="sq" style="width:72px;height:72px;border-radius:9999px;"></div><div class="name">pill<span>full</span></div></div>
  </div>
</body></html>
