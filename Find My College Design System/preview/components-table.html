<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--bg-white); }
  .head { font-size:12px; color:var(--text-tertiary); margin-bottom:14px; }
  .head b { color:var(--text-secondary); font-weight:700; }
  table { width:100%; border-collapse:separate; border-spacing:0; font-family:'Inter'; font-size:14px;
          border:1px solid var(--border-subtle); border-radius:14px; overflow:hidden; }
  thead th { text-align:left; padding:14px 16px; font-weight:700; color:var(--text-primary);
             background:var(--bg-pastel-beige-1); border-bottom:1px solid var(--border-subtle); }
  tbody td { padding:14px 16px; color:var(--text-primary); border-bottom:1px solid var(--border-subtle); font-weight:500; }
  tbody tr:last-child td { border-bottom:0; }
</style></head>
<body>

      <tr><td>Label</td><td>Label</td><td>Label</td></tr>
      <tr><td>Label</td><td>Label</td><td>Label</td></tr>
    </tbody>
  </table>
</body></html>
