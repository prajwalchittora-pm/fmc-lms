<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 28px; background:var(--neutral-900); display:flex; flex-direction:column; gap:14px; color:#fff; }
  .head { font-size:12px; color:var(--neutral-400); }
  .head b { color:#fff; font-weight:700; }
  .row { display:flex; gap:14px; }
  .lockup { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px; padding:16px 12px; border:1px dashed var(--neutral-700); border-radius:10px; }
  .lockup img { height:48px; }
  .meta { font-size:11px; color:var(--neutral-400); text-align:center; }
  .meta b { display:block; color:#fff; font-weight:700; font-size:12px; margin-bottom:2px; }
</style></head>
<body>
  <div class="head"><b>Dark-BG lockups</b> · use on neutral-800 or darker. Same orientations as light-BG set.</div>
  <div class="row">
    <div class="lockup">
      <img src="../assets/logos/Primary_Horizontal_DarkBG.svg" alt="">
      <div class="meta"><b>Horizontal</b></div>
    </div>
    <div class="lockup">
      <img src="../assets/logos/Primary_Stacked_DarkBG.svg" alt="" style="height:72px;">
      <div class="meta"><b>Stacked</b></div>
    </div>
    <div class="lockup">
      <img src="../assets/logos/Icon_Solo_DarkBG.svg" alt="" style="height:56px;">
      <div class="meta"><b>Icon solo</b></div>
    </div>
  </div>
</body></html>
