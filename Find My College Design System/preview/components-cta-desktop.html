<!-- @dsCard group="Components" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
<style>
  body { margin:0; padding:22px 24px; background:var(--bg-white); display:flex; flex-direction:column; gap:14px; }
  .head { font-size:12px; color:var(--text-tertiary); }
  .head b { color:var(--text-secondary); font-weight:700; }
  .grid { display:grid; grid-template-columns:80px auto auto auto; gap:14px 18px; align-items:start; justify-content:start; }
  .col-h { font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--text-tertiary); text-align:left; }
  .row-h { font-size:11px; font-weight:700; color:var(--text-primary); padding-top:28px; }
  .cell { display:flex; flex-direction:column; gap:6px; align-items:flex-start; }
  .state { font-size:9px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.06em; font-weight:600; }
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; font-family:inherit; font-weight:700; border-radius:12px; border:0; cursor:pointer; padding:0 22px; white-space:nowrap; }
  .ico { font-family:'Material Symbols Rounded'; font-weight:400; font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20; line-height:1; }
  /* sizes — desktop */
  .lg { height:50px; font-size:16px; }
  .md { height:44px; font-size:15px; padding:0 18px; }
  .sm { height:32px; font-size:13px; padding:0 14px; border-radius:8px; }
  .lg .ico, .md .ico { font-size:20px; }
  .sm .ico { font-size:16px; }
  /* types */
  .primary   { background:var(--blue-700); color:#fff; }
  .primary.hov { background:var(--blue-800); }
  .secondary { background:#fff; color:var(--blue-700); box-shadow:inset 0 0 0 1px var(--blue-700); }
  .secondary.hov { background:var(--blue-50); }
  .tertiary  { background:transparent; color:var(--blue-700); padding:0 8px; }
  .tertiary .lbl { position:relative; }
  .tertiary.hov .lbl::after {
    content:""; position:absolute; left:0; right:0; bottom:-2px; height:1px; background:currentColor;
  }
</style></head>
<body>
  <div class="head"><b>CTA Desktop</b> · Primary · Secondary · Tertiary × Large/Medium/Small · default + hover</div>

  <div class="grid">
    <div></div>
    <div class="col-h">Large (50)</div>
    <div class="col-h">Medium (44)</div>
    <div class="col-h">Small (32)</div>

    <div class="row-h">Primary</div>
    <div class="cell">
      <div class="state">Default</div>
      <button class="btn primary lg"><span class="lbl">Get Free Counselling</span><span class="ico">arrow_forward</span></button>
      <div class="state">Hover</div>
      <button class="btn primary lg hov"><span class="lbl">Get Free Counselling</span><span class="ico">arrow_forward</span></button>
    </div>
    <div class="cell">
      <div class="state">Default</div>
      <button class="btn primary md"><span class="lbl">Counselling</span><span class="ico">arrow_forward</span></button>
      <div class="state">Hover</div>
      <button class="btn primary md hov"><span class="lbl">Counselling</span><span class="ico">arrow_forward</span></button>
    </div>
    <div class="cell">
      <div class="state">Default</div>
      <button class="btn primary sm"><span class="lbl">Counselling</span><span class="ico">arrow_forward</span></button>
      <div class="state">Hover</div>
      <button class="btn primary sm hov"><span class="lbl">Counselling</span><span class="ico">arrow_forward</span></button>
    </div>

    <div class="row-h">Secondary</div>
    <div class="cell">
      <div class="state">Default</div>
      <button class="btn secondary lg"><span class="lbl">Talk to a Counsellor</span><span class="ico">arrow_forward</span></button>
      <div class="state">Hover</div>
      <button class="btn secondary lg hov"><span class="lbl">Talk to a Counsellor</span><span class="ico">arrow_forward</span></button>
    </div>
    <div class="cell">
      <div class="state">Default</div>
      <button class="btn secondary md"><span class="lbl">Counsellor</span><span class="ico">arrow_forward</span></button>
      <div class="state">Hover</div>
      <button class="btn secondary md hov"><span class="lbl">Counsellor</span><span class="ico">arrow_forward</span></button>
    </div>
    <div class="cell">
      <div class="state">Default</div>
      <button class="btn secondary sm"><span class="lbl">Counsellor</span><span class="ico">arrow_forward</span></button>
      <div class="state">Hover</div>
      <button class="btn secondary sm hov"><span class="lbl">Counsellor</span><span class="ico">arrow_forward</span></button>
    </div>

    <div class="row-h">Tertiary</div>
    <div class="cell">
      <div class="state">Default</div>
      <button class="btn tertiary lg"><span class="lbl">Learn more</span><span class="ico">arrow_forward</span></button>
      <div class="state">Hover</div>
      <button class="btn tertiary lg hov"><span class="lbl">Learn more</span><span class="ico">arrow_forward</span></button>
    </div>
    <div class="cell">
      <div class="state">Default</div>
      <button class="btn tertiary md"><span class="lbl">Learn more</span><span class="ico">arrow_forward</span></button>
      <div class="state">Hover</div>
      <button class="btn tertiary md hov"><span class="lbl">Learn more</span><span class="ico">arrow_forward</span></button>
    </div>
    <div class="cell">
      <div class="state">Default</div>
      <button class="btn tertiary sm"><span class="lbl">Learn more</span><span class="ico">arrow_forward</span></button>
      <div class="state">Hover</div>
      <button class="btn tertiary sm hov"><span class="lbl">Learn more</span><span class="ico">arrow_forward</span></button>
    </div>
  </div>
</body></html>
