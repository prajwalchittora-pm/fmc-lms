<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 28px; background:var(--bg-section); display:flex; align-items:center; gap:24px; }
  .frame { position:relative; padding:48px; background:#fff; border:1px dashed var(--blue-700); border-radius:12px; }
  .frame::before, .frame::after { content:""; position:absolute; background:rgba(4,75,221,.18); }
  /* Top + bottom clear-space stripes (height = ~22% of the artwork height) */
  .frame::before { left:48px; right:48px; top:14px; height:24px; }
  .frame::after  { left:48px; right:48px; bottom:14px; height:24px; }
  .frame .side { position:absolute; top:48px; bottom:48px; width:24px; background:rgba(4,75,221,.18); }
  .frame .l { left:14px; } .frame .r { right:14px; }
  .frame img { display:block; height:80px; }
  .notes { font-size:12px; color:var(--text-secondary); max-width:300px; line-height:1.55; }
  .notes b { color:var(--text-primary); font-weight:700; display:block; margin-bottom:4px; font-size:13px; }
  .notes code { background:var(--bg-pastel-beige-1); padding:1px 6px; border-radius:4px; font-size:11px; }
</style></head>
<body>
  <div class="frame">
    <span class="side l"></span><span class="side r"></span>
    <img src="../assets/logos/Primary_Horizontal_LightBG.svg" alt="">
  </div>
  <div class="notes">
    <b>Clear-space rule</b>
    Reserve clear space on all sides equal to the height of the icon's middle (red) parallelogram. Don't crop, recolour, rotate, outline, or place on a competing background.
  </div>
</body></html>
