<!-- @dsCard group="Components" -->
<!-- figma: 223:216 Toggle -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--bg-white); display:flex; flex-direction:column; gap:14px; }
  .head { font-size:12px; color:var(--text-tertiary); }
  .head b { color:var(--text-secondary); font-weight:700; }
  .row { display:flex; gap:32px; align-items:center; }
  .cell { display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
  .state { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.06em; font-weight:700; }
  .toggle { width:48px; height:24px; border-radius:20px; position:relative; transition:background .15s; }
  .toggle .knob { position:absolute; top:2px; width:20px; height:20px; border-radius:20px; transition:left .15s; }
  .toggle.off { background:var(--neutral-100); }
  .toggle.off .knob  { left:2px; background:#fff; box-shadow:0 1px 2px rgba(15,15,15,0.15); }
  .toggle.on  { background:var(--orange-500); }
  .toggle.on  .knob  { left:26px; background:#ffe7d4; }
</style></head>
<body>
  <div class="head"><b>Toggle</b> · Figma <code style="font-size:11px;">223:216</code> · 48×24 · orange-500 when on · 20px knob</div>
  <div class="row">
    <div class="cell"><div class="state">Off</div><div class="toggle off"><div class="knob"></div></div></div>
    <div class="cell"><div class="state">On</div><div class="toggle on"><div class="knob"></div></div></div>
  </div>
</body></html>
