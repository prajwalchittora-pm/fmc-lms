<!-- @dsCard group="Components" -->
<!-- figma: 223:438 Search Bar -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:26px 28px; background:var(--bg-white); display:flex; flex-direction:column; gap:14px; }
  .head { font-size:12px; color:var(--text-tertiary); }
  .head b { color:var(--text-secondary); font-weight:700; }
  .search {
    display:flex; align-items:center; gap:10px;
    height:48px; padding:0 18px;
    background:#fff; border-radius:9999px;
    border:1px solid var(--border-subtle);
    font-family:'Inter'; font-size:14px;
    color:var(--text-tertiary);
    max-width:480px;
  }
  .search.focused { border-color:var(--neutral-800); color:var(--text-primary); }
  .search.filled  { color:var(--text-primary); font-weight:500; }
  .icon { width:18px; height:18px; color:var(--text-tertiary); flex-shrink:0; }
  .icon svg { width:100%; height:100%; }
  .state { font-size:10px; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.06em; font-weight:700; margin-bottom:6px; }
  .row { display:flex; flex-direction:column; gap:4px; }
</style></head>
<body>
  <div class="head"><b>Search Bar</b> · Figma <code style="font-size:11px;">223:438</code> · pill · 48h · search icon + placeholder</div>
  <div class="row"><div class="state">Default</div>
    <div class="search">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg></span>
      <span>Search college</span>
    </div>
  </div>
  <div class="row"><div class="state">Focused</div>
    <div class="search focused">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg></span>
      <span>Search college</span>
    </div>
  </div>
  <div class="row"><div class="state">Filled</div>
    <div class="search filled">
      <span class="icon" style="color:var(--text-primary);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg></span>
      <span>IIT Madras</span>
    </div>
  </div>
</body></html>
