<!-- figma: 223:191 Segmented Buttons -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:26px 28px; background:var(--bg-white); display:flex; flex-direction:column; gap:14px; }
  .head { font-size:12px; color:var(--text-tertiary); }
  .head b { color:var(--text-secondary); font-weight:700; }
  .seg-group {
    display:inline-flex; padding:4px;
    background:color-mix(in srgb, var(--neutral-100) 50%, transparent);
    border-radius:9999px;
    border:1px solid rgba(15,15,15,0.04);
  }
  .seg-btn {
    height:32px; padding:0 18px;
    display:inline-flex; align-items:center; justify-content:center;
    border-radius:9999px; border:0; background:transparent;
    font-family:inherit; font-size:14px; font-weight:700; cursor:pointer;
    color:var(--neutral-800);
  }
  .seg-btn.selected { background:#fff; color:var(--orange-600); box-shadow:0 1px 2px rgba(15,15,15,0.08); }
  .row { display:flex; gap:24px; align-items:center; flex-wrap:wrap; }
</style></head>
<body>
  <div class="head"><b>Segmented Buttons</b> · Figma <code style="font-size:11px;">223:191</code> · pill track + active pill in white with orange-600 label</div>
  <div class="row">
    <div class="seg-group"><div class="seg-btn selected">Label 1</div><div class="seg-btn">Label 2</div></div>
    <div class="seg-group"><div class="seg-btn">Label 1</div><div class="seg-btn selected">Label 2</div></div>
  </div>
  <div class="row">
    <div class="seg-group"><div class="seg-btn selected">Desktop</div><div class="seg-btn">Mobile</div><div class="seg-btn">Tablet</div></div>
  </div>
</body></html>
