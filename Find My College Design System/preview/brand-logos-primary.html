<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 28px; background:var(--bg-white); display:flex; flex-direction:column; gap:14px; }
  .head { font-size:12px; color:var(--text-tertiary); }
  .head b { color:var(--text-secondary); font-weight:700; }
  .lockup { display:flex; align-items:center; gap:20px; padding:14px 16px; border:1px dashed var(--neutral-200); border-radius:10px; }
  .lockup img { height:44px; }
  .meta { font-size:11px; color:var(--text-tertiary); }
  .meta b { display:block; color:var(--text-primary); font-size:13px; font-weight:700; margin-bottom:2px; }
</style></head>
<body>
  <div class="head"><b>Primary lockups — Light BG</b></div>
  <div class="lockup">
    <img src="../assets/logos/Primary_Horizontal_LightBG.svg" alt="">
    <div class="meta"><b>Primary horizontal</b>Default for desktop / wide contexts. Min 120px wide.</div>
  </div>
  <div class="lockup">
    <img src="../assets/logos/Primary_Stacked_LightBG.svg" alt="" style="height:80px;">
    <div class="meta"><b>Primary stacked</b>Default for mobile + square contexts. Min 64px wide.</div>
  </div>
  <div class="lockup">
    <img src="../assets/logos/Wordmark_LightBG.svg" alt="">
    <div class="meta"><b>Wordmark only</b>When the icon would be redundant (e.g. inside the icon).</div>
  </div>
</body></html>
