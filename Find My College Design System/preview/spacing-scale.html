<!-- @dsCard group="Spacing" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 28px; background:var(--bg-white); }
  .head { font-size:12px; color:var(--text-tertiary); margin-bottom:14px; }
  .head b { color:var(--text-secondary); font-weight:700; }
  .row { display:flex; align-items:center; gap:14px; margin-bottom:8px; }
  .label { width:120px; font-size:12px; color:var(--text-secondary); font-feature-settings:"tnum"; }
  .label b { color:var(--text-primary); font-weight:700; }
  .bar { height:14px; background:var(--blue-700); border-radius:3px; }
</style></head>
<body>
  <div class="head"><b>Spacing scale</b> · 4-pt grid · token name → px</div>
  <div class="row"><div class="label"><b>--space-1</b> · 4px</div><div class="bar" style="width:4px"></div></div>
  <div class="row"><div class="label"><b>--space-2</b> · 8px</div><div class="bar" style="width:8px"></div></div>
  <div class="row"><div class="label"><b>--space-3</b> · 12px</div><div class="bar" style="width:12px"></div></div>
  <div class="row"><div class="label"><b>--space-4</b> · 16px</div><div class="bar" style="width:16px"></div></div>
  <div class="row"><div class="label"><b>--space-6</b> · 24px</div><div class="bar" style="width:24px"></div></div>
  <div class="row"><div class="label"><b>--space-8</b> · 32px</div><div class="bar" style="width:32px"></div></div>
  <div class="row"><div class="label"><b>--space-12</b> · 48px</div><div class="bar" style="width:48px"></div></div>
  <div class="row"><div class="label"><b>--space-16</b> · 64px</div><div class="bar" style="width:64px"></div></div>
  <div class="row"><div class="label"><b>--space-20</b> · 80px</div><div class="bar" style="width:80px"></div></div>
</body></html>
